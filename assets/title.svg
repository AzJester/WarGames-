<svg xmlns="http://www.w3.org/2000/svg" width="760" height="460" viewBox="0 0 760 460" role="img" aria-label="WarGames title screen: SHALL WE PLAY A GAME?">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#04150b"/>
      <stop offset="60%" stop-color="#020a05"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="scan" width="6" height="3" patternUnits="userSpaceOnUse">
      <rect width="6" height="3" fill="none"/>
      <rect width="6" height="1" fill="#000000" opacity="0.28"/>
    </pattern>
  </defs>
  <rect width="760" height="460" fill="url(#bg)"/>
  <g fill="#3aff6e" filter="url(#glow)" font-family="'Courier New',monospace">
    <text x="380" y="120" font-size="74" font-weight="bold" letter-spacing="10" text-anchor="middle">WARGAMES</text>
    <text x="380" y="158" font-size="17" letter-spacing="5" text-anchor="middle" opacity="0.85">WAR OPERATION PLAN RESPONSE</text>
    <g font-size="22">
      <text x="90" y="250">CONNECT 1200</text>
      <text x="90" y="284">LOGON: joshua</text>
      <text x="90" y="330">GREETINGS PROFESSOR FALKEN.</text>
      <text x="90" y="372">SHALL WE PLAY A GAME?</text>
      <text x="90" y="410">&gt; <tspan fill="#3aff6e">&#9608;</tspan></text>
    </g>
  </g>
  <rect width="760" height="460" fill="url(#scan)"/>
  <rect width="760" height="460" fill="none" stroke="#000" stroke-width="40" opacity="0.55"/>
</svg>
