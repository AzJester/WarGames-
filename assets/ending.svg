<svg xmlns="http://www.w3.org/2000/svg" width="760" height="460" viewBox="0 0 760 460" role="img" aria-label="The closing line: the only winning move is not to play">
  <defs>
    <radialGradient id="bg2" cx="50%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#04150b"/>
      <stop offset="60%" stop-color="#020a05"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <filter id="glow2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="scan2" width="6" height="3" patternUnits="userSpaceOnUse">
      <rect width="6" height="3" fill="none"/>
      <rect width="6" height="1" fill="#000000" opacity="0.28"/>
    </pattern>
  </defs>
  <rect width="760" height="460" fill="url(#bg2)"/>
  <rect x="0" y="0" width="760" height="42" fill="#000000" opacity="0.85"/>
  <line x1="0" y1="42" x2="760" y2="42" stroke="#3aff6e" opacity="0.6"/>
  <g font-family="'Courier New',monospace" filter="url(#glow2)">
    <text x="24" y="29" font-size="20" fill="#3aff6e" letter-spacing="3">DEFCON 5 [&#183;&#183;&#183;&#183;&#183;]</text>
    <text x="736" y="29" font-size="18" fill="#3aff6e" letter-spacing="2" text-anchor="end">STAND DOWN</text>
    <g fill="#3aff6e" font-size="24">
      <text x="60" y="150">GREETINGS PROFESSOR FALKEN.</text>
      <text x="60" y="206">A STRANGE GAME.</text>
      <text x="60" y="248">THE ONLY WINNING MOVE</text>
      <text x="60" y="288">IS NOT TO PLAY.</text>
      <text x="60" y="356">HOW ABOUT A NICE GAME OF CHESS?</text>
      <text x="60" y="404">&gt; <tspan>&#9608;</tspan></text>
    </g>
  </g>
  <rect width="760" height="460" fill="url(#scan2)"/>
  <rect width="760" height="460" fill="none" stroke="#000" stroke-width="40" opacity="0.55"/>
</svg>
