name: tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run test suites
        run: |
          node tests/smoke.js
          node tests/games.js
          node tests/intro.js
          node tests/crisis.js
          node tests/sound.js
          node tests/modern.js
